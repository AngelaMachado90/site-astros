    <style>
        /* Correções para garantir menu mobile */
        @media (max-width: 991.98px) {
            .cosmic-nav-mobile {
                background: linear-gradient(135deg, #1b1f3b, #2a1b4a);
                padding: 12px 0;
                border-bottom: 2px solid #d4af37;
                position: sticky;
                top: 0;
                z-index: 100;
                flex-wrap: wrap;
                gap: 8px;
            }
            .cosmic-nav-mobile .nav-link-cosmic {
                color: #fff;
                background: rgba(255,255,255,0.1);
                border-radius: 30px;
                padding: 6px 14px;
                font-size: 0.85rem;
                transition: all 0.3s;
                text-decoration: none;
            }
            .cosmic-nav-mobile .nav-link-cosmic:hover {
                background: #d4af37;
                color: #1b1f3b;
                transform: translateY(-2px);
            }
            .cosmic-nav-main-desktop {
                display: none !important;
            }
        }
        @media (min-width: 992px) {
            .cosmic-nav-mobile {
                display: none !important;
            }
        }
        
        /* Garantir que o conteúdo apareça após carregar */
        body {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        body.loaded {
            opacity: 1;
        }
    </style>
