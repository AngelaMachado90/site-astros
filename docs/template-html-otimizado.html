<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Template SEO Otimizado | Astros</title>
    <meta
      name="description"
      content="Template HTML otimizado para SEO, Core Web Vitals e responsividade em site de astrologia."
    />
    <meta
      name="keywords"
      content="astrologia, signos, horóscopo, template seo, core web vitals"
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#111827" />
    <link rel="canonical" href="https://astros.koddahub.com.br/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:title" content="Template SEO Otimizado | Astros" />
    <meta
      property="og:description"
      content="Estrutura pronta com SEO, lazy loading, imagens dimensionadas e CSS externo."
    />
    <meta property="og:url" content="https://astros.koddahub.com.br/" />
    <meta
      property="og:image"
      content="https://astros.koddahub.com.br/assets/img/logo_celestial.png"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Template SEO Otimizado | Astros" />
    <meta
      name="twitter:description"
      content="Template pronto para performance e indexação."
    />
    <meta
      name="twitter:image"
      content="https://astros.koddahub.com.br/assets/img/logo_celestial.png"
    />

    <link rel="icon" href="/assets/img/favicon.png" type="image/png" />
    <link rel="shortcut icon" href="/assets/img/favicon.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/template-otimizado.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Template HTML Otimizado</h1>
        <p>Estrutura base para páginas rápidas, responsivas e bem indexáveis.</p>
        <img
          src="/assets/img/logo_celestial.png"
          alt="Logo Astros"
          width="1024"
          height="1024"
          loading="eager"
          decoding="async"
          fetchpriority="high"
        />
      </section>

      <section>
        <h2>Signos</h2>
        <div class="signos-table-wrapper">
          <table class="signos-table">
            <thead>
              <tr>
                <th>Signo</th>
                <th>Elemento</th>
                <th>Regente</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Áries</td>
                <td>Fogo</td>
                <td>Marte</td>
              </tr>
              <tr>
                <td>Touro</td>
                <td>Terra</td>
                <td>Vênus</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="ad-container" aria-label="Área de anúncio com espaço reservado">
        Publicidade
      </section>

      <section>
        <h2>Galeria (lazy)</h2>
        <img
          src="/assets/icons/signos/aries.svg"
          alt="Ícone de Áries"
          width="20"
          height="20"
          loading="lazy"
          decoding="async"
        />
      </section>
    </main>

    <footer>
      <div class="container">
        <div class="row">
          <p>© 2026 Astros - Template otimizado.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
