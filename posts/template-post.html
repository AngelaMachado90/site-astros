<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carregando...</title>
    <style>
        body { margin: 0; padding: 20px; text-align: center; font-family: sans-serif; background: #1b1f3b; color: #fff; }
        .loader { margin-top: 50px; }
    </style>
</head>
<body>
    <div class="loader">
        <p>✨ Carregando Aurora Scorpio... ✨</p>
    </div>

    <script>
    async function loadComponent(name, targetId) {
        try {
            const response = await fetch(`/components/${name}.html`);
            if (!response.ok) throw new Error(`Erro ao carregar ${name}`);
            const html = await response.text();
            
            if (name === 'header') {
                document.open();
                document.write(html);
                document.close();
                document.body.style.opacity = '0';
            } else if (name === 'navbar') {
                const navbarPlaceholder = document.createElement('div');
                navbarPlaceholder.id = 'navbar-placeholder';
                document.body.insertBefore(navbarPlaceholder, document.querySelector('main') || document.body.firstChild);
                document.getElementById('navbar-placeholder').innerHTML = html;
            } else if (name === 'footer') {
                const footerPlaceholder = document.createElement('div');
                footerPlaceholder.id = 'footer-placeholder';
                document.body.appendChild(footerPlaceholder);
                document.getElementById('footer-placeholder').innerHTML = html;
            }
        } catch (error) {
            console.error(`Erro ao carregar ${name}:`, error);
        }
    }

    async function loadPage() {
        await loadComponent('header', 'header');
        await loadComponent('navbar', 'navbar');
        await loadComponent('footer', 'footer');
        setTimeout(() => {
            if (document.body) document.body.style.opacity = '1';
        }, 100);
    }

    loadPage();
    </script>

    <main class="container content-shell my-5" id="main-content" style="min-height: 400px;">
        <!-- CONTEÚDO DO POST VAI AQUI -->
        <article>
            <h1 class="text-roxo">Título do Post</h1>
            <p>Conteúdo do post...</p>
        </article>
    </main>
</body>
</html>
