# Exemplo para /etc/nginx/sites-available/astros.koddahub.com.br
# Use este bloco somente se o servidor de producao for Nginx.

server {
    listen 80;
    server_name astros.koddahub.com.br www.astros.koddahub.com.br;

    root /var/www/astros.koddahub.com.br;
    index index.html index.php;

    location / {
        try_files $uri $uri/ /index.html =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location ~* \.(css|js|mjs|png|jpg|jpeg|gif|ico|webp|avif|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;
}
